<svg width="960" height="540" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0F1729"/><stop offset="1" stop-color="#1B2538"/></linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ECB45F"/><stop offset="1" stop-color="#D4912F"/></linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>

  <!-- Header -->
  <g transform="translate(48,36)" font-family="Helvetica,Arial,sans-serif">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="url(#amber)"/>
    <g fill="#0F1729"><rect x="11" y="10" width="5" height="20" rx="2"/><rect x="24" y="10" width="5" height="20" rx="2"/><rect x="14" y="18" width="12" height="4.5" rx="2"/></g>
    <text x="52" y="20" font-size="13" fill="#9AA6BA" font-family="monospace">#HD-2041</text>
    <text x="52" y="40" font-size="18" font-weight="800" fill="#fff">Booking page throwing 500 error on submit</text>
  </g>

  <!-- Thread (left) -->
  <g font-family="Helvetica,Arial,sans-serif">
    <!-- customer msg -->
    <g transform="translate(48,100)">
      <rect width="560" height="84" rx="12" fill="#fff"/>
      <text x="18" y="26" font-size="11" fill="#5A687F" font-family="monospace">Marcy Allen · Bloom Dental · 18m ago</text>
      <text x="18" y="50" font-size="14" fill="#111827">Hi — the booking page throws an error the moment I hit</text>
      <text x="18" y="69" font-size="14" fill="#111827">submit. My clients can't book. Can you look ASAP?</text>
    </g>
    <!-- agent reply -->
    <g transform="translate(168,196)">
      <rect width="560" height="66" rx="12" fill="#E5EEF8" stroke="#CFE0F3"/>
      <text x="18" y="25" font-size="11" fill="#3B6FB0" font-family="monospace">Dana Kim · reply · 12m ago</text>
      <text x="18" y="48" font-size="14" fill="#111827">On it now — reproduced the error, fix is deploying. I'll confirm shortly.</text>
    </g>
    <!-- internal note -->
    <g transform="translate(48,274)">
      <rect width="680" height="56" rx="12" fill="#FFF8EC" stroke="#E0A24A" stroke-dasharray="4 3"/>
      <text x="18" y="24" font-size="11" fill="#B97E2C" font-family="monospace">Dana Kim · internal note · @Theo</text>
      <text x="18" y="44" font-size="13.5" fill="#5A4326">Form validation bug on prod — escalated to eng, ticket linked.</text>
    </g>
    <!-- composer -->
    <g transform="translate(48,346)">
      <rect width="680" height="150" rx="12" fill="#131C2E" stroke="#232E45"/>
      <rect x="16" y="16" width="120" height="30" rx="8" fill="#fff"/><text x="76" y="36" font-size="12" font-weight="700" fill="#0F1729" text-anchor="middle">Reply</text>
      <rect x="144" y="16" width="120" height="30" rx="8" fill="#232E45"/><text x="204" y="36" font-size="12" fill="#9AA6BA" text-anchor="middle">Internal note</text>
      <text x="18" y="78" font-size="13.5" fill="#5A687F">Reply to Marcy…</text>
      <text x="18" y="132" font-size="11" fill="#7C8AA3">Sends to the customer via Email</text>
      <rect x="556" y="112" width="108" height="30" rx="8" fill="url(#amber)"/><text x="610" y="132" font-size="12.5" font-weight="700" fill="#0F1729" text-anchor="middle">Send reply</text>
    </g>
  </g>

  <!-- Side panel (right) -->
  <g transform="translate(748,100)" font-family="Helvetica,Arial,sans-serif">
    <rect width="164" height="186" rx="12" fill="#131C2E" stroke="#232E45"/>
    <text x="16" y="28" font-size="10.5" fill="#7C8AA3" font-family="monospace" letter-spacing="1">STATUS</text>
    <rect x="16" y="36" width="132" height="30" rx="7" fill="#fff"/><text x="28" y="56" font-size="12.5" font-weight="600" fill="#111827">Open</text>
    <text x="16" y="92" font-size="10.5" fill="#7C8AA3" font-family="monospace" letter-spacing="1">PRIORITY</text>
    <rect x="16" y="100" width="80" height="22" rx="11" fill="#FBE6E6"/><text x="26" y="115" font-size="10" font-weight="700" fill="#D64545">URGENT</text>
    <text x="16" y="148" font-size="10.5" fill="#7C8AA3" font-family="monospace" letter-spacing="1">ASSIGNEE</text>
    <circle cx="28" cy="166" r="11" fill="#B97E2C"/><text x="28" y="170" font-size="9" fill="#fff" text-anchor="middle">DK</text>
    <text x="46" y="170" font-size="12.5" fill="#fff">Dana Kim</text>
  </g>
  <g transform="translate(748,300)" font-family="Helvetica,Arial,sans-serif">
    <rect width="164" height="100" rx="12" fill="#131C2E" stroke="#232E45"/>
    <text x="16" y="28" font-size="10.5" fill="#7C8AA3" font-family="monospace" letter-spacing="1">SLA</text>
    <text x="16" y="56" font-size="22" font-weight="800" fill="#D64545">-0:42</text>
    <text x="16" y="76" font-size="11" fill="#9AA6BA">breach · first reply</text>
  </g>
</svg>
