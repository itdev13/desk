      <text x="22" y="48" font-size="15" font-weight="700" fill="#111827">Booking page throwing 500 error on submit</text>
      <text x="700" y="32" font-size="14" font-weight="700" fill="#D64545">-0:42</text>
      <text x="700" y="48" font-size="10" fill="#9AA6BA">SLA BREACH</text>
      <circle cx="822" cy="33" r="15" fill="#B97E2C"/><text x="822" y="38" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">DK</text>
