      <text x="700" y="32" font-size="14" font-weight="700" fill="#2F9E6B">3:48</text>
      <text x="700" y="48" font-size="10" fill="#9AA6BA">HEALTHY</text>
      <circle cx="822" cy="33" r="15" fill="#2F9E6B"/><text x="822" y="38" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">LR</text>
