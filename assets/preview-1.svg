      <text x="700" y="32" font-size="14" font-weight="700" fill="#D9822B">1:10</text>
      <text x="700" y="48" font-size="10" fill="#9AA6BA">TO FIRST REPLY</text>
      <circle cx="822" cy="33" r="15" fill="#3B6FB0"/><text x="822" y="38" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">MR</text>
