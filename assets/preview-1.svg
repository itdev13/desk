      <rect x="0" y="8" width="5" height="50" rx="3" fill="#D9822B"/>
      <text x="22" y="27" font-size="12" fill="#5A687F">#HD-2038</text>
      <rect x="92" y="17" width="42" height="16" rx="8" fill="#FBEEDC"/><text x="101" y="29" font-size="10" font-weight="700" fill="#D9822B">HIGH</text>
