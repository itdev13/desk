    <text x="72" y="28" font-family="Helvetica,Arial,sans-serif" font-size="30" font-weight="800" fill="#fff">Helm<tspan fill="#E0A24A">Desk</tspan></text>
    <text x="73" y="50" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#9AA6BA">Every request owned, tracked, resolved.</text>
  </g>

