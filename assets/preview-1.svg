    <g transform="translate(216,0)"><rect width="200" height="70" rx="12" fill="#131C2E" stroke="#232E45"/><text x="18" y="40" font-size="30" font-weight="800" fill="#D64545">3</text><text x="18" y="58" font-size="12" fill="#7C8AA3">OVERDUE</text></g>
    <g transform="translate(432,0)"><rect width="200" height="70" rx="12" fill="#131C2E" stroke="#232E45"/><text x="18" y="40" font-size="30" font-weight="800" fill="#fff">1.4h</text><text x="18" y="58" font-size="12" fill="#7C8AA3">AVG FIRST REPLY</text></g>
    <g transform="translate(648,0)"><rect width="200" height="70" rx="12" fill="#131C2E" stroke="#232E45"/><text x="18" y="40" font-size="30" font-weight="800" fill="#2F9E6B">94%</text><text x="18" y="58" font-size="12" fill="#7C8AA3">IN SLA · 30d</text></g>
